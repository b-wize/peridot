---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: peridot
# description will be included in the image's metadata
description: Fedora Atomic with a few tweaks

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/blue-build/base-images/fedora-kinoite
image-version: 43 # latest is also supported if you want new updates ASAP

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  - type: os-release
    properties:
      NAME: Peridot_OS
      PRETTY_NAME: Peridot
  
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /

  - type: dnf
    repos:
      copr:
        - atim/starship
        - matinlotfali/KDE-Rounded-Corners 
    install:
      packages:
        - micro
        - starship
        #- kwin-effect-roundcorners
        - hplip 
        - pam 
        - pam-u2f 
        - pamu2fcfg 
        - ulauncher 
        - yubikey-manager 
        - yubikey-manager-qt

    - type: custom
      commands:
        - |
          echo "Installing upstream Mozilla Firefox…"

          # Download latest Firefox tarball
          curl -L "https://download.mozilla.org/?product=firefox-latest&os=linux64&lang=en-US" \
          -o /tmp/firefox.tar.bz2

          # Extract into /usr/lib
          mkdir -p /usr/lib/firefox
          tar -xjf /tmp/firefox.tar.bz2 -C /usr/lib/firefox --strip-components=1

          # Symlink into PATH
          ln -sf /usr/lib/firefox/firefox /usr/bin/firefox

          # Install desktop entry
          cat >/usr/share/applications/firefox.desktop << 'EOF'
          [Desktop Entry]
          Name=Firefox (Upstream)
          Comment=Browse the Web
          Exec=/usr/bin/firefox %u
          Terminal=false
          Type=Application
          Icon=/usr/lib/firefox/browser/chrome/icons/default/default128.png
          Categories=Network;WebBrowser;
          MimeType=text/html;text/xml;application/xhtml+xml;x-scheme-handler/http;x-scheme-handler/https;
          EOF
  
          # Cleanup
          rm -f /tmp/firefox.tar.bz2


    remove:
      packages:
        # example: removing firefox (in favor of the flatpak)
        # "firefox" is the main package, "firefox-langpacks" is a dependency
        - firefox
        - firefox-langpacks # also remove firefox dependency (not required for all packages, this is a special case)
        - kde-connect 
        - kdeconnectd 
        - kde-connect-libs 
        - kate 
        - kate-libs 
        - kate-plugins 
        - kate-krunner-plugin 
        - kwrite 
        - krfb 
        - krfb-libs 
        - kcharselect 
        - plasma-discover 
        - plasma-discover-libs 
        - plasma-discover-flatpak 
        - plasma-discover-notifier  
        - plasma-discover-kns

  - type: default-flatpaks
    configurations:
      - notify: true # Send notification after install/uninstall is finished (true/false)
        scope: system
        # If no repo information is specified, Flathub will be used by default
        install: # system flatpaks we want all users to have and not remove
         - io.github.kolunmi.Bazaar
         - com.github.tchx84.Flatseal
         - io.github.dvlv.boxbuddyrs
         - com.usebottles.bottles
         - org.kde.kalk
         - com.discordapp.Discord
         - com.vscodium.codium
         - org.remmina.Remmina
         - org.videolan.VLC
      - scope: user # Also add Flathub user repo, but no user packages

  - type: signing # this sets up the proper policy & signing files for signed images to work fully
